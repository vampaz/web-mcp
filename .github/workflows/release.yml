name: release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set node version to 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Check npm version
        run: npm --version

      - run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run typecheck
        run: npm exec tsc -- --noEmit

      - name: Run tests
        run: npm run test

      - name: Run build
        run: npm run build

      - name: Configure npm registry for trusted publishing
        run: printf 'registry=https://registry.npmjs.org/\n' > ~/.npmrc

      - name: Check if version already published
        id: npm-check
        run: |
          VERSION=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(pkg.version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if npm view @vampaz/webmcp-kit@"$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version already published
        if: steps.npm-check.outputs.published == 'true'
        run: echo "Version ${{ steps.npm-check.outputs.version }} already published. Skipping npm publish."

      - name: Publish to npm
        if: steps.npm-check.outputs.published != 'true'
        run: npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Configure GitHub Packages registry
        run: |
          printf '@vampaz:registry=https://npm.pkg.github.com\n' > ~/.npmrc
          printf '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n' >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version already published to GitHub Packages
        id: github-packages-check
        run: |
          if npm view @vampaz/webmcp-kit@"${{ steps.npm-check.outputs.version }}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if version already published to GitHub Packages
        if: steps.github-packages-check.outputs.published == 'true'
        run: echo "Version ${{ steps.npm-check.outputs.version }} already published to GitHub Packages. Skipping GitHub Packages publish."

      - name: Publish to GitHub Packages
        if: steps.github-packages-check.outputs.published != 'true'
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if GitHub release exists
        id: release-check
        run: |
          if gh release view "${{ steps.npm-check.outputs.tag }}" >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if GitHub release exists
        if: steps.release-check.outputs.published == 'true'
        run: echo "Release ${{ steps.npm-check.outputs.tag }} already exists. Skipping GitHub release creation."

      - name: Create GitHub release
        if: steps.release-check.outputs.published != 'true'
        run: |
          gh release create "${{ steps.npm-check.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "@vampaz/webmcp-kit ${{ steps.npm-check.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
